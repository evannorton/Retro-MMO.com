<h1>Leaderboards</h1>
        <div id="search-pagination-container">
            <div id="search-bar-container">
                <input type="text" id="search-bar" placeholder="Search username..." />
                <button id="search-button">Search</button>
            </div>
            <div id="pagination-top"></div>
        </div>
        <div id="search-results"></div>
        <table id="leaderboards" hidden>
            <thead>
                <tr>
                    <th scope="col" role="columnheader" data-sort-method="number">#</th>
                    <th scope="col" role="columnheader" data-sort-method="string">
                        Username
                    </th>
                    <th scope="col" role="columnheader" data-sort-method="number">
                        Experience
                    </th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div id="pagination-bottom-container">
            <div id="pagination-bottom"></div>
        </div>
